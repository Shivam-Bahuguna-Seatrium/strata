name = "strata-hydration"
compatibility_date = "2024-12-01"

# D1 Database binding — uncomment and update after running:
# npx wrangler d1 create strata-db
#
# [[d1_databases]]
# binding = "DB"
# database_name = "strata-db"
# database_id = "YOUR_DATABASE_ID_HERE"

# Environment variables (secrets via `wrangler secret put KEY`)
# RAZORPAY_KEY_ID, RAZORPAY_KEY_SECRET, RAZORPAY_WEBHOOK_SECRET, JWT_SECRET

[vars]
NEXT_PUBLIC_BASE_URL = "https://strata-hydration.pages.dev"
